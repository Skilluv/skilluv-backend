name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build
        run: cargo build --release

      - name: Clippy lint
        run: cargo clippy -- -D warnings -A dead_code -A unused_imports

  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: check

    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: skilluv
          POSTGRES_PASSWORD: skilluv_secret
          POSTGRES_DB: skilluv
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U skilluv"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:8.8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      # MinIO n'est PAS declare comme service GHA : les services ne supportent
      # pas de champ `command`, et l'image minio/minio requiert `server /data`
      # en argument (sans ca, elle affiche l'usage et sort). On la lance en step
      # (voir "Start MinIO container" plus bas).

    env:
      DATABASE_URL: postgres://skilluv:skilluv_secret@localhost:5433/skilluv
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret
      BASE_URL: http://localhost:3001
      JUDGE0_URL: http://localhost:2358
      MINIO_ENDPOINT: http://localhost:9004
      MINIO_ACCESS_KEY: skilluv
      MINIO_SECRET_KEY: skilluv_secret
      MINIO_BUCKET: avatars

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Start MinIO container
        run: |
          docker run -d --name minio \
            -p 9004:9000 \
            -e MINIO_ROOT_USER=skilluv \
            -e MINIO_ROOT_PASSWORD=skilluv_secret \
            minio/minio:RELEASE.2025-09-07T16-13-09Z \
            server /data

      - name: Wait for MinIO to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9004/minio/health/live > /dev/null 2>&1; then
              echo "MinIO ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "MinIO failed to become ready after 30s"
          docker logs minio
          exit 1

      - name: Cache cargo registry & build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Run integration tests
        run: cargo test -- --test-threads=1

      - name: Cleanup MinIO container
        if: always()
        run: docker rm -f minio || true
