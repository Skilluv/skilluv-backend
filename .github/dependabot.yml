# Dependabot config — Skilluv backend.
# Groups minor + patch to avoid PR noise; majors get their own PR for review.
# All schedules weekly (Monday morning UTC) to batch review load.

version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels: [dependencies, rust]
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, github-actions]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, docker]
